<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">ProofRAG evidence-contracted RAG architecture</title>
  <desc id="desc">Question input flows through contract inference, retrieval, evidence ledger, sufficiency scoring, strict context packing, generation, and experiment logging.</desc>
  <rect width="980" height="430" fill="#ffffff"/>
  <style>
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 7; }
    .gate { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 7; }
    .out { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; rx: 7; }
    .txt { font-family: Arial, sans-serif; font-size: 14px; fill: #0f172a; }
    .small { font-family: Arial, sans-serif; font-size: 12px; fill: #475569; }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="490" y="36" text-anchor="middle" class="title">ProofRAG: Evidence Contracts Before Generation</text>

  <rect x="36" y="86" width="125" height="74" class="box"/>
  <text x="98.5" y="116" text-anchor="middle" class="txt">Question</text>
  <text x="98.5" y="137" text-anchor="middle" class="small">user query</text>

  <rect x="196" y="86" width="145" height="74" class="box"/>
  <text x="268.5" y="108" text-anchor="middle" class="txt">Contract</text>
  <text x="268.5" y="128" text-anchor="middle" class="txt">Inference</text>
  <text x="268.5" y="148" text-anchor="middle" class="small">rule/adaptive/LLM</text>

  <rect x="376" y="66" width="165" height="114" class="box"/>
  <text x="458.5" y="100" text-anchor="middle" class="txt">Retrieval</text>
  <text x="458.5" y="122" text-anchor="middle" class="small">MiniRAG export</text>
  <text x="458.5" y="142" text-anchor="middle" class="small">BM25 + hybrid</text>
  <text x="458.5" y="162" text-anchor="middle" class="small">optional vector stores</text>

  <rect x="576" y="86" width="145" height="74" class="box"/>
  <text x="648.5" y="116" text-anchor="middle" class="txt">EvidenceLedger</text>
  <text x="648.5" y="137" text-anchor="middle" class="small">slot-mapped records</text>

  <rect x="756" y="74" width="170" height="98" class="gate"/>
  <text x="841" y="104" text-anchor="middle" class="txt">Sufficiency Gate</text>
  <text x="841" y="126" text-anchor="middle" class="small">required slots</text>
  <text x="841" y="146" text-anchor="middle" class="small">source counts</text>
  <text x="841" y="166" text-anchor="middle" class="small">contradictions</text>

  <rect x="300" y="266" width="170" height="82" class="box"/>
  <text x="385" y="298" text-anchor="middle" class="txt">Strict Context</text>
  <text x="385" y="319" text-anchor="middle" class="txt">Packer</text>
  <text x="385" y="340" text-anchor="middle" class="small">answer policy prompt</text>

  <rect x="510" y="266" width="150" height="82" class="box"/>
  <text x="585" y="300" text-anchor="middle" class="txt">Generator</text>
  <text x="585" y="322" text-anchor="middle" class="small">Ollama/SLM/API</text>

  <rect x="700" y="250" width="170" height="114" class="out"/>
  <text x="785" y="282" text-anchor="middle" class="txt">Outputs</text>
  <text x="785" y="304" text-anchor="middle" class="small">answer or abstain</text>
  <text x="785" y="324" text-anchor="middle" class="small">JSONL logs</text>
  <text x="785" y="344" text-anchor="middle" class="small">tables + SVG charts</text>

  <path d="M161 123 H196" class="arrow"/>
  <path d="M341 123 H376" class="arrow"/>
  <path d="M541 123 H576" class="arrow"/>
  <path d="M721 123 H756" class="arrow"/>
  <path d="M841 172 C841 232 470 218 421 266" class="arrow"/>
  <path d="M470 307 H510" class="arrow"/>
  <path d="M660 307 H700" class="arrow"/>

  <path d="M841 172 C895 220 902 250 870 286" class="arrow"/>
  <text x="899" y="230" class="small">fail: abstain</text>
  <text x="497" y="232" class="small">pass: pack evidence and call model</text>
</svg>
