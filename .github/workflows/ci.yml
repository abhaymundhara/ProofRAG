name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev tools
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check proofrag scripts tests

      - name: Mypy
        run: python -m mypy

      - name: Pytest
        run: pytest

      - name: Toy benchmark smoke
        run: python scripts/run_toy_benchmark.py

      - name: Reproduction smoke
        run: |
          bash scripts/reproduce_paper_results.sh \
            benchmarks/sample_minirag_export.jsonl \
            /tmp/proofrag_repro_ci

      - name: Package build
        run: python -m build --sdist --wheel --outdir /tmp/proofrag_dist_ci

      - name: Distribution contents
        run: python scripts/verify_distribution_contents.py --dist-dir /tmp/proofrag_dist_ci

      - name: Local release evidence bundle
        if: matrix.python-version == '3.11'
        run: python scripts/run_local_release_checks.py --output-dir /tmp/proofrag_release_checks_ci

      - name: Upload release evidence
        if: always() && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: proofrag-release-evidence
          path: /tmp/proofrag_release_checks_ci
